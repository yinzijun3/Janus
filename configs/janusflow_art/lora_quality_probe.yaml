experiment:
  name: janusflow_art_lora_quality_probe
  output_root: /root/autodl-tmp/emoart_gen_runs/out_janusflow_art_lora_quality_probe

model:
  model_path: /root/autodl-tmp/model_cache/janusflow_art/JanusFlow-1.3B
  vae_path: /root/autodl-tmp/model_cache/janusflow_art/sdxl-vae
  dtype: bf16

data:
  train_manifest: /root/autodl-tmp/emoart_gen_runs/data_risk_audit_train_texture_meta/train_frameclean_v2.jsonl
  val_manifest: /root/autodl-tmp/data/emoart_5k/gen_full_official_texture_meta/val.jsonl
  image_size: 384
  image_preprocess_mode: crop
  reference_image_size: 224
  prompt_template: strong_style
  log_rendered_prompt: true

training:
  seed: 42
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 1
  num_workers: 2
  num_epochs: 3.0
  max_steps: 450
  learning_rate: 5.0e-5
  generation_learning_rate: 0.0
  weight_decay: 0.0
  warmup_ratio: 0.05
  scheduler_type: cosine
  gradient_checkpointing: true
  max_grad_norm: 0.75
  flow_loss_type: mse
  use_cfg_training: true

freeze:
  understanding_path: true
  trainable_base_modules: []
  language_lora:
    enabled: true
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
    r: 64
    alpha: 128
    dropout: 0.02
    train_last_n_layers: 16
    inference_scale: 0.25

conditioning:
  enabled: false
  style_hidden_size: 512
  num_global_tokens: 4
  num_local_tokens: 8
  label_encoder:
    enabled: false
    dropout: 0.0
  reference_encoder:
    enabled: false
    base_channels: 64
  injector:
    enabled: false
    use_global: false
    use_local: false
    global_scale: 1.0
    local_scale: 1.0
    dropout: 0.0

loss_weights:
  flow: 1.0
  semantic_align: 0.0
  art_align: 0.0
  style_cls: 0.0
  texture_aux: 0.0

sampling:
  prompt_file: /root/autodl-tmp/repos/Janus/configs/janusflow_art/prompts_baseline.jsonl
  output_subdir: sampled
  num_inference_steps: 30
  cfg_weight: 2.25
  seeds:
    - 42
    - 43
    - 44
    - 45
  save_grid: true
  save_prompt_log: true

evaluation:
  prompt_file: /root/autodl-tmp/repos/Janus/configs/janusflow_art/prompts_baseline.jsonl
  output_subdir: evaluation
  compare_base_model: true
  num_inference_steps: 30
  cfg_weight: 2.25
  seeds:
    - 42
    - 43
    - 44
    - 45
  clip_model_name: openai/clip-vit-base-patch32
  save_blind_review_bundle: true

logging:
  logging_steps: 10
  eval_steps: 150
  save_steps: 150
  keep_last_prompts: 64
  run_final_eval: false
